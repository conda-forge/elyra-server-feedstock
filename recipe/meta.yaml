{% set name = "elyra-server" %}
{% set version = "4.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/elyra_server-{{ version }}.tar.gz
  sha256: 0b314e55b310f2969dca5567751aa74e762453b5f313dca0c3f37b3af968e256

build:
  noarch: python
  entry_points:
    - elyra-metadata = elyra.metadata.metadata_app:MetadataApp.main
    - elyra-pipeline = elyra.cli.pipeline_app:pipeline
    - jupyter-elyra = elyra.elyra_app:launch_instance
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    # NOTE: appengine-python-standard is listed in upstream PyPI metadata
    # but is not available on conda-forge. Verify if actually needed at runtime.
    - autopep8 >=1.5.0
    - black >=22.8.0
    - click ==8.1.8
    - colorama
    - deprecation
    - entrypoints >=0.3
    - jinja2 >=3
    - jsonschema >=3.2.0
    - jupyter_client >=7.4.9
    - jupyter_core >=5.3.1
    - jupyter_events >=0.7.0
    - jupyter-packaging >=0.12.3
    - jupyter-resource-usage >=1.1.0,<1.2
    - jupyter_server >=2.7.3
    - jupyterlab-git >=0.51.2,<0.52
    - jupyterlab-lsp >=5.1.0,<5.2
    - jupyterlab >=4.4,<5.0
    - markupsafe >=2.1
    - minio >=7.0.0,!=7.2.1
    - nbclient >=0.10.0
    - nbconvert >=6.5.1
    - nbdime >=4.0.1,<4.1
    - nbformat >=5.1.2
    - networkx >=2.5.1
    - papermill >=2.3.4
    - pygithub
    - python-lsp-server >=1.11.0
    - pyyaml >=5.3.1
    - requests >=2.31
    - rfc3986-validator >=0.1.1
    - tornado >=6.1.0
    - traitlets >=4.3.2
    - typing-extensions >=3.10
    - urllib3 >=1.26.5
    - watchdog >=2.1.3
    - websocket-client
    - yaspin

test:
  imports:
    - elyra
  commands:
    # appengine-python-standard is an accidental upstream dep (never imported, not on conda-forge)
    - pip check 2>&1 | grep -v "appengine-python-standard" | grep -E "which is not installed|has requirement" && exit 1 || true
    - elyra-metadata --help
    - elyra-pipeline --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/elyra-server/
  summary: "The elyra-server package provides common core libraries and functions that are required by Elyra's individual extensions. Note: Installing this package alone will not enable the use of Elyra. Please install the 'elyra' package instead. e.g. pip install elyra[all]"
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akchinSTC
    - lresende
